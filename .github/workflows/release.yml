name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Resolve version
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if (-not $version) { $version = "1.1.0" }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Build executable
        run: .\build_exe.ps1
        shell: pwsh

      - name: Sign executable if certificate is configured
        run: .\scripts\sign_windows.ps1 -FilePath .\dist\Converter.exe
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Build installer
        run: .\build_installer.ps1
        shell: pwsh

      - name: Sign installer if certificate is configured
        run: .\scripts\sign_windows.ps1 -FilePath .\dist\ConverterSetup.exe
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Converter ${{ github.ref_name }}
          body: |
            Automated Windows release for Converter.

            Includes:
            - Converter.exe portable executable
            - ConverterSetup.exe Windows installer
          files: |
            dist/Converter.exe
            dist/ConverterSetup.exe
