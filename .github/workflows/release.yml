name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, for example 1.3.9"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Resolve version
        run: |
          $manualVersion = "${{ github.event.inputs.version }}"
          $refName = "${{ github.ref_name }}"
          if ($manualVersion) {
            $version = $manualVersion.TrimStart("v")
          } elseif ($refName.StartsWith("v")) {
            $version = $refName.TrimStart("v")
          } else {
            $version = python -c "from app import APP_VERSION; print(APP_VERSION)"
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid version: $version"
          }
          $appVersion = python -c "from app import APP_VERSION; print(APP_VERSION)"
          if ($appVersion -ne $version) {
            throw "APP_VERSION ($appVersion) does not match release version ($version)."
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build executable
        run: .\build_exe.ps1
        shell: pwsh

      - name: Sign executable if certificate is configured
        run: .\scripts\sign_windows.ps1 -FilePath .\dist\Converter.exe
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Build portable zip
        run: |
          $portable = ".\dist\portable"
          New-Item -ItemType Directory -Path $portable -Force | Out-Null
          Copy-Item .\dist\Converter.exe "$portable\Converter.exe" -Force
          New-Item -ItemType File -Path "$portable\portable.flag" -Force | Out-Null
          Compress-Archive -Path "$portable\*" -DestinationPath .\dist\ConverterPortable.zip -Force
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Build installer
        run: .\build_installer.ps1
        shell: pwsh

      - name: Sign installer if certificate is configured
        run: .\scripts\sign_windows.ps1 -FilePath .\dist\ConverterSetup.exe
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Generate checksums
        run: |
          Get-FileHash .\dist\Converter.exe -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  Converter.exe" } | Set-Content .\dist\checksums-sha256.txt
          Get-FileHash .\dist\ConverterSetup.exe -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  ConverterSetup.exe" } | Add-Content .\dist\checksums-sha256.txt
          Get-FileHash .\dist\ConverterPortable.zip -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  ConverterPortable.zip" } | Add-Content .\dist\checksums-sha256.txt
        shell: pwsh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Converter ${{ github.ref_name }}
          body: |
            Windows release for Converter.

            Includes:
            - Converter.exe standalone executable
            - ConverterSetup.exe Windows installer
            - ConverterPortable.zip portable package
            - checksums-sha256.txt integrity hashes

            Highlights:
            - In-app update downloader for installer, EXE, and portable ZIP
            - Output preview table, batch analysis, error panel, and current-file progress
            - Compact mode, low-power mode, persistent metadata cache, and queue drag reorder
            - .converterprofile export/import with installer association
            - Portable ZIP release asset and installer portable option
          files: |
            dist/Converter.exe
            dist/ConverterSetup.exe
            dist/ConverterPortable.zip
            dist/checksums-sha256.txt
