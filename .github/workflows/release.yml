name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, for example 1.3.10"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Resolve version
        run: |
          $appVersion = @'
          import ast
          from pathlib import Path

          tree = ast.parse(Path("app.py").read_text(encoding="utf-8"))
          for node in tree.body:
              if not isinstance(node, ast.Assign):
                  continue
              for target in node.targets:
                  if isinstance(target, ast.Name) and target.id == "APP_VERSION":
                      if isinstance(node.value, ast.Constant) and isinstance(node.value.value, str):
                          print(node.value.value)
                          raise SystemExit(0)
          raise SystemExit("APP_VERSION not found in app.py")
          '@ | python -
          if ($LASTEXITCODE -ne 0) {
            throw "Could not resolve APP_VERSION from app.py."
          }
          $appVersion = $appVersion.Trim()

          $manualVersion = "${{ github.event.inputs.version }}"
          $refName = "${{ github.ref_name }}"
          if ($manualVersion) {
            $version = $manualVersion.TrimStart("v")
          } elseif ($refName.StartsWith("v")) {
            $version = $refName.TrimStart("v")
          } else {
            $version = $appVersion
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid version: $version"
          }
          if ($appVersion -ne $version) {
            throw "APP_VERSION ($appVersion) does not match release version ($version)."
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build executable
        run: .\build_exe.ps1
        shell: pwsh

      - name: Sign executable if certificate is configured
        run: .\scripts\sign_windows.ps1 -FilePath .\dist\Converter.exe
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Build portable zip
        run: |
          $ErrorActionPreference = "Stop"
          $portable = ".\dist\portable"
          $zipPath = ".\dist\ConverterPortable.zip"
          $verifyDir = ".\dist\portable-verify"

          if (-not (Test-Path -LiteralPath ".\dist\Converter.exe" -PathType Leaf)) {
            throw "Missing executable for portable package: .\dist\Converter.exe"
          }

          Remove-Item -LiteralPath $portable -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $zipPath -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $verifyDir -Recurse -Force -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Path $portable -Force | Out-Null
          Copy-Item -LiteralPath ".\dist\Converter.exe" -Destination (Join-Path $portable "Converter.exe") -Force
          New-Item -ItemType File -Path (Join-Path $portable "portable.flag") -Force | Out-Null
          Compress-Archive -LiteralPath (Join-Path $portable "Converter.exe"), (Join-Path $portable "portable.flag") -DestinationPath $zipPath -CompressionLevel Optimal

          Expand-Archive -LiteralPath $zipPath -DestinationPath $verifyDir -Force
          $verifyRoot = (Resolve-Path -LiteralPath $verifyDir).Path
          $entries = Get-ChildItem -LiteralPath $verifyRoot -File -Recurse |
            ForEach-Object { $_.FullName.Substring($verifyRoot.Length + 1).Replace("\", "/") } |
            Sort-Object
          $expected = @("Converter.exe", "portable.flag")
          $diff = Compare-Object -ReferenceObject $expected -DifferenceObject $entries
          if ($diff) {
            throw "Portable ZIP has unexpected contents: $($entries -join ', ')"
          }
          Remove-Item -LiteralPath $verifyDir -Recurse -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Build installer
        run: .\build_installer.ps1
        shell: pwsh

      - name: Sign installer if certificate is configured
        run: .\scripts\sign_windows.ps1 -FilePath .\dist\ConverterSetup.exe
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Generate checksums
        run: |
          $ErrorActionPreference = "Stop"
          $artifacts = @(
            [pscustomobject]@{ Path = ".\dist\Converter.exe"; Name = "Converter.exe" },
            [pscustomobject]@{ Path = ".\dist\ConverterSetup.exe"; Name = "ConverterSetup.exe" },
            [pscustomobject]@{ Path = ".\dist\ConverterPortable.zip"; Name = "ConverterPortable.zip" }
          )

          $lines = foreach ($artifact in $artifacts) {
            if (-not (Test-Path -LiteralPath $artifact.Path -PathType Leaf)) {
              throw "Missing release artifact for checksum: $($artifact.Path)"
            }
            $hash = (Get-FileHash -LiteralPath $artifact.Path -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($artifact.Name)"
          }

          $lines | Set-Content -LiteralPath ".\dist\checksums-sha256.txt" -Encoding ascii
          Get-Content -LiteralPath ".\dist\checksums-sha256.txt"
        shell: pwsh

      - name: Verify release artifacts
        run: |
          $ErrorActionPreference = "Stop"
          $required = @(
            ".\dist\Converter.exe",
            ".\dist\ConverterSetup.exe",
            ".\dist\ConverterPortable.zip",
            ".\dist\checksums-sha256.txt"
          )
          foreach ($path in $required) {
            $item = Get-Item -LiteralPath $path -ErrorAction Stop
            if ($item.Length -le 0) {
              throw "Release artifact is empty: $path"
            }
          }

          $checksumEntries = Get-Content -LiteralPath ".\dist\checksums-sha256.txt"
          $expectedNames = @("Converter.exe", "ConverterSetup.exe", "ConverterPortable.zip")
          if ($checksumEntries.Count -ne $expectedNames.Count) {
            throw "Expected $($expectedNames.Count) checksum entries, found $($checksumEntries.Count)."
          }
          foreach ($name in $expectedNames) {
            if (-not ($checksumEntries | Where-Object { $_ -match "^[a-f0-9]{64}\s\s$([regex]::Escape($name))$" })) {
              throw "Missing or invalid checksum entry for $name."
            }
          }
        shell: pwsh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Converter ${{ github.ref_name }}
          body: |
            Windows release for Converter.

            Includes:
            - Converter.exe standalone executable
            - ConverterSetup.exe Windows installer
            - ConverterPortable.zip portable package
            - checksums-sha256.txt integrity hashes

            Highlights:
            - Faster output-size estimates with shared per-format cache
            - Safer background work: stale scans are ignored and close callbacks are guarded
            - Target-size warnings no longer mark successful files as failed
            - More robust local/CI build scripts with artifact validation
            - In-app update downloader for installer, EXE, and portable ZIP
            - Output preview table, batch analysis, error panel, and current-file progress
            - Compact mode, low-power mode, persistent metadata cache, and queue drag reorder
            - .converterprofile export/import with installer association
            - Portable ZIP release asset and installer portable option
          files: |
            dist/Converter.exe
            dist/ConverterSetup.exe
            dist/ConverterPortable.zip
            dist/checksums-sha256.txt
          fail_on_unmatched_files: true
